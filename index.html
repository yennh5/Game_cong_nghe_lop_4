    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #e8f5e9; /* Xanh pastel nhẹ */
            background-image: radial-gradient(#c8e6c9 2px, transparent 2px);
            background-size: 30px 30px;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .btn-option {
            transition: all 0.2s ease;
        }
        .btn-option:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        .btn-option:active:not(:disabled) {
            transform: translateY(1px);
        }

        /* Flashcard Animations */
        .flashcard-container {
            perspective: 1000px;
        }
        .flashcard {
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }
        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
        }
        .flashcard-front {
            background: linear-gradient(135deg, #ffb74d, #ff9800);
            color: white;
        }
        .flashcard-back {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: black;
            transform: rotateY(180deg);
        }

        /* Input styling for fill-in-the-blank */
        .fill-input {
            border: 2px dashed #90caf9;
            border-radius: 8px;
            padding: 4px 12px;
            margin: 0 4px;
            text-align: center;
            font-weight: bold;
            color: #1565c0;
            width: 120px;
            outline: none;
            transition: all 0.3s;
        }
        .fill-input:focus {
            border-color: #2196f3;
            background: #e3f2fd;
        }
        .fill-input.correct {
            border-color: #4caf50;
            background: #c8e6c9;
            color: #2e7d32;
        }
        .fill-input.incorrect {
            border-color: #f44336;
            background: #ffcdd2;
            color: #c62828;
        }

        /* T/F Button States */
        .tf-btn.selected {
            border: 3px solid #2196f3;
            background-color: #e3f2fd;
        }
        .tf-btn.correct-tf { background-color: #c8e6c9; border-color: #4caf50; color: #2e7d32; }
        .tf-btn.incorrect-tf { background-color: #ffcdd2; border-color: #f44336; color: #c62828; }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); }
        }
        .animate-bounce-in {
            animation: bounceIn 0.5s ease forwards;
        }
    </style>
</head>

    <script>
        // --- DATA BỘ CÂU HỎI ---
        const questions = [
            // I. TRẮC NGHIỆM
            { type: 'mcq', text: "Câu 1: Có mấy cách để bón phân cho hoa, cây cảnh?", options: ["A. 2", "B. 3", "C. 4", "D. 5"], answer: 1 },

            // III. CÂU HỎI NỐI (Chuyển thành Trắc nghiệm)

            { type: 'mcq', text: "Câu 17: Chi tiết 'Tấm 2 lỗ' là hình nào?", options: ["A. Hình a (Tấm mặt cabin)", "B. Hình b (Tấm sau cabin)", "C. Hình c (Tấm 2 lỗ)", "D. Hình d (Tấm chữ L)"], answer: 2 },

            // II. ĐÚNG / SAI
            {

                items: [
                    { id: 0, text: "1. Khi thừa ánh sáng, màu sắc của lá cây vẫn không thay đổi.", answer: 'S' },
                    { id: 1, text: "2. Mỗi loài cây, ta cần tưới nước định kì phù hợp.", answer: 'Đ' },
                    { id: 2, text: "3. Ta không được cắt tỉa cành vì làm cây chậm phát triển.", answer: 'S' },
                    { id: 3, text: "4. Ốc sên là loài vật phá hoại cây trồng cần tiêu diệt.", answer: 'Đ' }
                ]
            },
            { 
                type: 'tf', 
                text: "Câu 14: Chọn Đúng (Đ) hoặc Sai (S) cho các phát biểu về đồ chơi:", 
                items: [
                    { id: 0, text: "1. Đồ chơi dân gian có tích hợp tính năng thông minh, điện tử thì không.", answer: 'S' },
                    { id: 1, text: "2. Đồ chơi dân gian cần tập trung cao độ, điện tử thì không.", answer: 'S' },
                    { id: 2, text: "3. Đồ chơi dân gian quen thuộc nhiều thế hệ, đồ chơi hiện đại đa dạng mẫu mã.", answer: 'Đ' },
                    { id: 3, text: "4. Đồ chơi dân gian làm từ vật liệu dễ tìm, đồ chơi hiện đại dùng công nghệ.", answer: 'Đ' }
                ]
            },

            // IV. ĐIỀN TỪ
            {
                type: 'fill',
                text: "Câu 4: Điền từ thích hợp vào ô trống:",
                template: "Hoa, cây cảnh cần đủ ánh sáng để {0}. Thiếu ánh sáng cây sẽ bị {1}. Ánh sáng quá mạnh có thể làm cho cây bị {2}. Cần phải đảm bảo đủ {3} cho cây.",
                answers: ["quang hợp", "vàng úa", "cháy lá", "ánh sáng"]
            },
            {
                type: 'fill',
                text: "Câu 16: Điền từ thích hợp vào ô trống:",
                template: "Đèn lồng đơn giản nhất làm bằng {0}, phức tạp hơn thì có khung {1} hoặc khung {2}. Theo thời gian, đèn lồng giấy được thay bằng {3}.",
                answers: ["giấy", "tre", "kim loại", "vải"]
            }
        ];

        const flashcardsData = [
            { front: "Em hãy nêu trình tự lắp ghép mô hình kĩ thuật?", back: "Bước 1: Lựa chọn chi tiết và dụng cụ.<br>Bước 2: Lắp ghép theo mẫu.<br>Bước 3: Giới thiệu và nhận xét sản phẩm.<br>Bước 4: Tháo và cất dọn đồ dùng." },
            { front: "Em hãy nêu một vài lưu ý khi tưới nước cho hoa, cây cảnh.", back: "Hoa, cây cảnh cần được tưới đủ nước, nếu thiếu hoặc thừa nước sẽ ảnh hưởng đến sự sống và phát triển của cây.Dùng bình tưới cây hoặc dụng cụ phù hợp tưới nhẹ, đều và đủ ẩm toàn bộ phần giá thể trong chậu.Tưới nước định kì phù hợp cho từng loại cây." },
            { front: "Hãy nêu một số ứng dụng của rô-bốt thông minh trong cuộc sống hiện đại.", back: "Những ứng dụng của rô-bốt trong cuộc sống hiện đại là: Dọn dẹp nhà cửa, điều khiển máy móc, chăm sóc người bệnh, thu hoạch hoa quả, ..." },
            { front: "Hãy nêu một số ứng dụng của rô-bốt thông minh trong cuộc sống hiện đại.", back: " Những ứng dụng của rô-bốt trong cuộc sống hiện đại là: Dọn dẹp nhà cửa, điều khiển máy móc, chăm sóc người bệnh, thu hoạch hoa quả, ..." }
        ];

        // --- GAME STATE ---
        let currentQuestionIndex = 0;
        let score = 0;
        let answeredCurrent = false;

        // --- AUDIO SYSTEM (Web Audio API - Không cần file ngoài) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                // Ting ting sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } else {
                // Tùng tùng sound
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.4);
            }
        }

        // --- GAME LOGIC ---
        function startGame() {
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            document.getElementById('screen-game').classList.add('flex');
            document.getElementById('score-display').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            answeredCurrent = false;
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-check').classList.add('hidden');
            document.getElementById('feedback-area').classList.add('hidden');
            
            const q = questions[currentQuestionIndex];
            
            // Cập nhật UI
            document.getElementById('question-counter').innerText = `Câu hỏi ${currentQuestionIndex + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestionIndex) / questions.length) * 100}%`;
            
            const qContainer = document.getElementById('question-container');
            const aContainer = document.getElementById('answers-container');
            
            qContainer.innerHTML = `<h2 class="text-2xl font-bold text-slate-800 mb-2">${q.text}</h2>`;
            if (q.img) qContainer.innerHTML += `<p class="text-4xl mb-4">${q.img}</p>`;
            
            aContainer.innerHTML = '';
            aContainer.className = 'grid gap-3 mb-6'; // Reset grid

            if (q.type === 'mcq') {
                q.options.forEach((opt, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-option bg-white border-2 border-slate-200 text-slate-700 font-semibold p-4 rounded-xl text-left hover:border-blue-400 hover:bg-blue-50 w-full';
                    btn.innerText = opt;
                    btn.onclick = () => selectMCQ(index, btn, q.answer);
                    aContainer.appendChild(btn);
                });
            } 
            else if (q.type === 'tf') {
                document.getElementById('btn-check').classList.remove('hidden');
                q.items.forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'bg-white border-2 border-slate-200 p-4 rounded-xl flex flex-col md:flex-row justify-between items-center gap-4';
                    div.innerHTML = `
                        <span class="font-semibold text-slate-700 flex-1">${item.text}</span>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="selectTF(${index}, 'Đ', this)" class="tf-btn tf-opt-${index} bg-gray-100 text-gray-600 font-bold py-2 px-6 rounded-lg transition">Đúng</button>
                            <button onclick="selectTF(${index}, 'S', this)" class="tf-btn tf-opt-${index} bg-gray-100 text-gray-600 font-bold py-2 px-6 rounded-lg transition">Sai</button>
                        </div>
                    `;
                    aContainer.appendChild(div);
                });
            }
            else if (q.type === 'fill') {
                document.getElementById('btn-check').classList.remove('hidden');
                let htmlTemplate = q.template;
                q.answers.forEach((_, i) => {
                    htmlTemplate = htmlTemplate.replace(`{${i}}`, `<input type="text" id="fill-${i}" class="fill-input" autocomplete="off" spellcheck="false">`);
                });
                aContainer.innerHTML = `<div class="bg-white border-2 border-slate-200 p-6 rounded-xl text-lg leading-loose text-slate-700 font-medium">${htmlTemplate}</div>`;
            }
        }

        // --- XỬ LÝ TRẮC NGHIỆM ---
        function selectMCQ(selectedIndex, btnElement, correctIndex) {
            if (answeredCurrent) return;
            answeredCurrent = true;
            
            const buttons = document.getElementById('answers-container').querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            if (selectedIndex === correctIndex) {
                btnElement.classList.replace('bg-white', 'bg-green-100');
                btnElement.classList.replace('border-slate-200', 'border-green-500');
                btnElement.classList.add('text-green-700');
                btnElement.innerHTML += ' ✅';
                score++;
                showFeedback(true, "Chính xác! Giỏi quá!");
            } else {
                btnElement.classList.replace('bg-white', 'bg-red-100');
                btnElement.classList.replace('border-slate-200', 'border-red-500');
                btnElement.classList.add('text-red-700');
                btnElement.innerHTML += ' ❌';
                
                // Highlight correct answer
                buttons[correctIndex].classList.replace('bg-white', 'bg-green-100');
                buttons[correctIndex].classList.replace('border-slate-200', 'border-green-500');
                buttons[correctIndex].innerHTML += ' ✅';
                
                showFeedback(false, "Sai rồi. Hãy xem lại đáp án đúng nhé!");
            }
            updateScore();
            document.getElementById('btn-next').classList.remove('hidden');
        }

        // --- XỬ LÝ ĐÚNG/SAI ---
        let tfSelections = {};
        function selectTF(itemIndex, value, btnElement) {
            if (answeredCurrent) return;
            tfSelections[itemIndex] = value;
            
            const btns = document.querySelectorAll(`.tf-opt-${itemIndex}`);
            btns.forEach(b => {
                b.classList.remove('selected', 'border-blue-500');
                b.classList.add('bg-gray-100', 'border-transparent');
            });
            
            btnElement.classList.remove('bg-gray-100', 'border-transparent');
            btnElement.classList.add('selected');
        }

        // --- XỬ LÝ CHECK (T/F & Điền từ) ---
        function checkComplexAnswer() {
            if (answeredCurrent) return;
            const q = questions[currentQuestionIndex];
            let allCorrect = true;

            if (q.type === 'tf') {
                if (Object.keys(tfSelections).length < q.items.length) {
                    alert("Con hãy chọn đầy đủ Đúng/Sai cho tất cả các câu nhé!");
                    return;
                }
                answeredCurrent = true;
                document.getElementById('btn-check').classList.add('hidden');

                q.items.forEach((item, index) => {
                    const userAns = tfSelections[index];
                    const btns = document.querySelectorAll(`.tf-opt-${index}`);
                    btns.forEach(b => b.disabled = true);

                    const selectedBtn = Array.from(btns).find(b => b.classList.contains('selected'));
                    if (userAns === item.answer) {
                        selectedBtn.classList.add('correct-tf');
                        selectedBtn.innerHTML += ' ✅';
                    } else {
                        allCorrect = false;
                        selectedBtn.classList.add('incorrect-tf');
                        selectedBtn.innerHTML += ' ❌';
                        // Show correct one
                        const correctBtn = Array.from(btns).find(b => b.innerText.charAt(0) === item.answer);
                        if(correctBtn) {
                            correctBtn.classList.add('correct-tf');
                            correctBtn.innerHTML += ' ✅';
                        }
                    }
                });
                tfSelections = {}; // reset
            } 
            else if (q.type === 'fill') {
                answeredCurrent = true;
                document.getElementById('btn-check').classList.add('hidden');
                
                q.answers.forEach((ans, index) => {
                    const input = document.getElementById(`fill-${index}`);
                    input.disabled = true;
                    const userVal = input.value.trim().toLowerCase();
                    const correctVal = ans.toLowerCase();

                    if (userVal === correctVal) {
                        input.classList.add('correct');
                    } else {
                        allCorrect = false;
                        input.classList.add('incorrect');
                        // Tạo nhãn hiển thị đáp án đúng
                        const span = document.createElement('span');
                        span.className = "text-sm text-green-600 font-bold ml-1";
                        span.innerText = `(${ans})`;
                        input.parentNode.insertBefore(span, input.nextSibling);
                    }
                });
            }

            if (allCorrect) {
                score++;
                showFeedback(true, "Hoàn toàn chính xác! Xuất sắc!");
            } else {
                showFeedback(false, "Có chỗ chưa đúng rồi. Con xem lại đáp án nhé!");
            }
            
            updateScore();
            document.getElementById('btn-next').classList.remove('hidden');
        }

        // --- TIỆN ÍCH ---
        function showFeedback(isCorrect, message) {
            playSound(isCorrect ? 'correct' : 'incorrect');
            const fb = document.getElementById('feedback-area');
            fb.classList.remove('hidden');
            fb.classList.remove('bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            
            if (isCorrect) {
                fb.classList.add('bg-green-100', 'text-green-800');
                fb.innerHTML = `🎉 ${message}`;
            } else {
                fb.classList.add('bg-red-100', 'text-red-800');
                fb.innerHTML = `💡 ${message}`;
            }
        }

        function updateScore() {
            document.getElementById('current-score').innerText = score;
        }

        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('score-display').classList.add('hidden');
            document.getElementById('screen-result').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            // Render Flashcards
            const fcContainer = document.getElementById('flashcards-container');
            fcContainer.innerHTML = '';
            flashcardsData.forEach(fc => {
                const card = document.createElement('div');
                card.className = 'flashcard-container min-h-[12rem] w-full mb-4';
                card.innerHTML = `
                    <div class="flashcard relative w-full h-full shadow-lg rounded-2xl" onclick="this.classList.toggle('is-flipped')">
                        <div class="flashcard-face flashcard-front text-lg font-bold">
                            ❓ ${fc.front}
                        </div>
                        <div class="flashcard-face flashcard-back text-md font-semibold">
                            ✨ ${fc.back}
                        </div>
                    </div>
                `;
                fcContainer.appendChild(card);
            });
            
            // Nhạc ăn mừng nhỏ
            setTimeout(() => {
                playSound('correct');
                setTimeout(() => playSound('correct'), 200);
            }, 500);
        }

    </script>
</body>
</html>
